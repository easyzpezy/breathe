<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e14">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Breathe · Coherence</title>
<style>
  :root{
    --bg:#0a0e14;
    --bg2:#0d1420;
    --ink:#e6edf3;
    --muted:#71839b;
    --faint:#3a4a5e;
    --accent:#8fd9c4;
    --accent2:#6ea8d8;
    --card:rgba(255,255,255,0.028);
    --line:rgba(255,255,255,0.06);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    font-weight:300;
    overflow:hidden;
    user-select:none;-webkit-user-select:none;
    position:fixed;inset:0;width:100%;
    overscroll-behavior:none;
    touch-action:manipulation;
  }
  @supports(height:100dvh){body{height:100dvh;}}
  button,input{touch-action:manipulation;}
  /* ambient background */
  .ambient{position:fixed;inset:0;pointer-events:none;z-index:0;}
  .ambient::before{
    content:"";position:absolute;inset:0;
    background:
      radial-gradient(ellipse 80% 55% at 50% 115%, rgba(38,80,86,0.32), transparent 60%),
      radial-gradient(ellipse 60% 45% at 18% -8%, rgba(43,58,103,0.30), transparent 65%),
      radial-gradient(ellipse 45% 40% at 88% 12%, rgba(31,64,82,0.22), transparent 70%);
  }
  .star{position:absolute;border-radius:50%;background:#cfe7ef;opacity:0;animation:twinkle linear infinite;}
  @keyframes twinkle{
    0%,100%{opacity:0;}
    50%{opacity:var(--o,0.5);}
  }

  .app{position:relative;z-index:1;height:100%;display:flex;flex-direction:column;max-width:560px;margin:0 auto;padding:max(20px,env(safe-area-inset-top)) 24px 24px;}

  /* header */
  header{display:flex;align-items:center;justify-content:space-between;flex:0 0 auto;}
  .brand{font-size:13px;letter-spacing:0.42em;text-transform:uppercase;color:var(--muted);font-weight:400;}
  nav{display:flex;gap:4px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:3px;}
  nav button{
    background:transparent;border:0;color:var(--muted);cursor:pointer;
    font:inherit;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;
    padding:7px 16px;border-radius:999px;transition:all .35s ease;
  }
  nav button.on{background:rgba(143,217,196,0.10);color:var(--accent);}

  .view{flex:1;display:none;flex-direction:column;min-height:0;}
  .view.on{display:flex;}

  /* ===== practice view ===== */
  .stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;min-height:0;}

  .orbwrap{position:relative;width:min(64vw,300px,40vh);aspect-ratio:1;display:flex;align-items:center;justify-content:center;}
  svg.ring{position:absolute;inset:-14px;width:calc(100% + 28px);height:calc(100% + 28px);transform:rotate(-90deg);}
  .ring .track{fill:none;stroke:rgba(255,255,255,0.05);stroke-width:1.5;}
  .ring .prog{fill:none;stroke:rgba(143,217,196,0.35);stroke-width:1.5;stroke-linecap:round;transition:stroke-dashoffset 1s linear;}

  .halo{
    position:absolute;inset:8%;border-radius:50%;
    background:radial-gradient(circle, rgba(143,217,196,0.16), rgba(110,168,216,0.07) 55%, transparent 72%);
    filter:blur(22px);
    transform:scale(var(--s,0.78));
  }
  .orb{
    position:absolute;inset:22%;border-radius:50%;
    background:
      radial-gradient(circle at 36% 32%, rgba(232,250,246,0.85), rgba(143,217,196,0.55) 28%, rgba(96,160,178,0.42) 58%, rgba(58,98,140,0.30) 80%, rgba(40,70,110,0.18));
    box-shadow:
      0 0 60px rgba(126,200,186,0.25),
      0 0 140px rgba(96,150,200,0.14),
      inset 0 0 34px rgba(255,255,255,0.10);
    transform:scale(var(--s,0.78));
  }
  .orb::after{
    content:"";position:absolute;inset:-7%;border-radius:50%;
    border:1px solid rgba(190,235,222,0.16);
  }
  .phase{
    position:relative;z-index:2;text-align:center;pointer-events:none;
  }
  .phase .word{font-size:17px;letter-spacing:0.34em;text-transform:uppercase;color:var(--ink);font-weight:300;text-shadow:0 1px 14px rgba(10,14,20,0.6);transition:opacity .5s ease;}
  .phase .count{margin-top:8px;font-size:13px;color:rgba(230,237,243,0.55);font-variant-numeric:tabular-nums;letter-spacing:0.1em;}

  .remaining{margin-top:34px;font-size:13px;color:var(--muted);letter-spacing:0.22em;font-variant-numeric:tabular-nums;height:18px;}

  /* controls */
  .controls{flex:0 0 auto;display:flex;flex-direction:column;gap:18px;padding-bottom:6px;transition:opacity .5s ease;}
  .controls.hidden{opacity:0;pointer-events:none;}
  .row{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;}
  .chip{
    background:var(--card);border:1px solid var(--line);color:var(--muted);
    font:inherit;font-size:12.5px;letter-spacing:0.06em;padding:9px 18px;border-radius:999px;cursor:pointer;
    transition:all .3s ease;
  }
  .chip.on{border-color:rgba(143,217,196,0.45);color:var(--accent);background:rgba(143,217,196,0.07);}
  .chip:hover{color:var(--ink);}
  .chip.on:hover{color:var(--accent);}

  .pacewrap{display:flex;align-items:center;gap:14px;justify-content:center;max-width:330px;margin:0 auto;width:100%;}
  .pacewrap label{font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--faint);white-space:nowrap;}
  .pacewrap output{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;min-width:38px;}
  input[type=range]{
    -webkit-appearance:none;appearance:none;flex:1;height:2px;border-radius:2px;
    background:linear-gradient(to right, rgba(143,217,196,0.5) var(--fill,50%), rgba(255,255,255,0.09) var(--fill,50%));
    outline:none;cursor:pointer;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;width:16px;height:16px;border-radius:50%;
    background:#bfe8da;box-shadow:0 0 12px rgba(143,217,196,0.5);cursor:pointer;
  }
  input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:#bfe8da;border:0;box-shadow:0 0 12px rgba(143,217,196,0.5);cursor:pointer;}

  .beginrow{display:flex;align-items:center;justify-content:center;gap:14px;}
  .begin{
    background:linear-gradient(135deg, rgba(143,217,196,0.14), rgba(110,168,216,0.12));
    border:1px solid rgba(143,217,196,0.35);color:#d8f3ea;
    font:inherit;font-size:13px;letter-spacing:0.3em;text-transform:uppercase;
    padding:15px 46px 15px 50px;border-radius:999px;cursor:pointer;
    transition:all .35s ease;
  }
  .begin:hover{box-shadow:0 0 30px rgba(143,217,196,0.18);border-color:rgba(143,217,196,0.6);}
  .soundbtn{
    background:var(--card);border:1px solid var(--line);color:var(--muted);width:46px;height:46px;border-radius:50%;
    cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .3s ease;
  }
  .soundbtn.on{color:var(--accent);border-color:rgba(143,217,196,0.35);}

  .endbtn{
    position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);
    background:transparent;border:1px solid var(--line);color:var(--faint);
    font:inherit;font-size:11px;letter-spacing:0.26em;text-transform:uppercase;
    padding:10px 26px;border-radius:999px;cursor:pointer;opacity:0;pointer-events:none;transition:all .5s ease;
  }
  .endbtn.show{opacity:1;pointer-events:auto;}
  .endbtn:hover{color:var(--muted);border-color:rgba(255,255,255,0.14);}

  /* completion overlay */
  .done{
    position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
    background:rgba(8,11,16,0.82);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    opacity:0;pointer-events:none;transition:opacity .8s ease;text-align:center;padding:30px;
  }
  .done.show{opacity:1;pointer-events:auto;}
  .done .big{font-size:21px;letter-spacing:0.3em;text-transform:uppercase;color:var(--ink);}
  .done .sub{font-size:14px;color:var(--muted);letter-spacing:0.06em;line-height:1.8;}
  .done .chip{margin-top:18px;padding:12px 34px;}

  /* ===== journey view ===== */
  .journey{overflow-y:auto;-webkit-overflow-scrolling:touch;padding-top:30px;scrollbar-width:none;}
  .journey::-webkit-scrollbar{display:none;}
  .statgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
  .stat{
    background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px 22px;
  }
  .stat .num{font-size:30px;font-weight:200;color:var(--ink);font-variant-numeric:tabular-nums;}
  .stat .num em{font-style:normal;font-size:14px;color:var(--muted);margin-left:4px;}
  .stat .lbl{margin-top:5px;font-size:10.5px;letter-spacing:0.2em;text-transform:uppercase;color:var(--faint);}

  .sect{margin-top:30px;}
  .sect h3{font-size:11px;letter-spacing:0.26em;text-transform:uppercase;color:var(--faint);font-weight:400;margin-bottom:14px;}
  .days{display:flex;gap:6px;justify-content:space-between;}
  .day{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;}
  .day .dot{width:100%;max-width:26px;aspect-ratio:1;border-radius:50%;border:1px solid var(--line);background:transparent;transition:all .3s;}
  .day.hit .dot{background:radial-gradient(circle at 38% 32%, rgba(200,240,228,0.9), rgba(143,217,196,0.45) 60%);border-color:transparent;box-shadow:0 0 10px rgba(143,217,196,0.35);}
  .day.today .dot{border-color:rgba(143,217,196,0.5);}
  .day span{font-size:9px;color:var(--faint);letter-spacing:0.05em;}

  .log{display:flex;flex-direction:column;gap:8px;padding-bottom:30px;}
  .entry{
    display:flex;align-items:center;justify-content:space-between;
    background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 18px;
  }
  .entry .l{display:flex;flex-direction:column;gap:3px;}
  .entry .when{font-size:13px;color:var(--ink);}
  .entry .pat{font-size:10.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--faint);}
  .entry .mins{font-size:13px;color:var(--accent);font-variant-numeric:tabular-nums;letter-spacing:0.05em;}
  .empty{color:var(--faint);font-size:13px;text-align:center;padding:26px 0;line-height:1.9;letter-spacing:0.04em;}

  /* compact phones */
  @media (max-height:700px){
    .controls{gap:12px;}
    .remaining{margin-top:20px;}
    .begin{padding:12px 38px 12px 42px;}
    .chip{padding:8px 14px;font-size:12px;}
  }
</style>
</head>
<body>
<div class="ambient" id="ambient"></div>

<div class="app">
  <header>
    <div class="brand">Breathe</div>
    <nav>
      <button id="navPractice" class="on">Practice</button>
      <button id="navJourney">Journey</button>
    </nav>
  </header>

  <!-- PRACTICE -->
  <section class="view on" id="viewPractice">
    <div class="stage">
      <div class="orbwrap" id="orbwrap">
        <svg class="ring" viewBox="0 0 100 100">
          <circle class="track" cx="50" cy="50" r="48.5"/>
          <circle class="prog" id="prog" cx="50" cy="50" r="48.5" stroke-dasharray="304.7" stroke-dashoffset="304.7"/>
        </svg>
        <div class="halo" id="halo"></div>
        <div class="orb" id="orb"></div>
        <div class="phase">
          <div class="word" id="phaseWord">ready</div>
          <div class="count" id="phaseCount"></div>
        </div>
      </div>
      <div class="remaining" id="remaining"></div>
      <button class="endbtn" id="endBtn">end session</button>
    </div>

    <div class="controls" id="controls">
      <div class="row" id="patternRow">
        <button class="chip on" data-pat="coherence">Coherence</button>
        <button class="chip" data-pat="478">4 · 7 · 8</button>
      </div>
      <div class="pacewrap" id="paceWrap">
        <label>pace</label>
        <input type="range" id="pace" min="40" max="70" value="55" step="5">
        <output id="paceOut">5.5s</output>
      </div>
      <div class="row" id="durRow">
        <button class="chip" data-min="3">3 min</button>
        <button class="chip on" data-min="5">5 min</button>
        <button class="chip" data-min="10">10 min</button>
        <button class="chip" data-min="15">15 min</button>
      </div>
      <div class="beginrow">
        <button class="begin" id="beginBtn">Begin</button>
        <button class="soundbtn on" id="soundBtn" title="chimes on/off">♪</button>
      </div>
    </div>
  </section>

  <!-- JOURNEY -->
  <section class="view journey" id="viewJourney">
    <div class="statgrid">
      <div class="stat"><div class="num" id="stSessions">0</div><div class="lbl">sessions</div></div>
      <div class="stat"><div class="num" id="stMinutes">0<em>min</em></div><div class="lbl">time in practice</div></div>
      <div class="stat"><div class="num" id="stStreak">0<em>days</em></div><div class="lbl">current streak</div></div>
      <div class="stat"><div class="num" id="stBest">0<em>days</em></div><div class="lbl">best streak</div></div>
    </div>
    <div class="sect">
      <h3>last 14 days</h3>
      <div class="days" id="days"></div>
    </div>
    <div class="sect">
      <h3>recent sessions</h3>
      <div class="log" id="log"></div>
    </div>
  </section>
</div>

<!-- completion -->
<div class="done" id="done">
  <div class="big">complete</div>
  <div class="sub" id="doneSub"></div>
  <button class="chip" id="doneBtn">return</button>
</div>

<script>
"use strict";
/* ---------- ambient stars ---------- */
(function(){
  const amb = document.getElementById('ambient');
  for(let i=0;i<26;i++){
    const s=document.createElement('div');
    s.className='star';
    const sz=(Math.random()*1.6+0.6).toFixed(1);
    s.style.width=s.style.height=sz+'px';
    s.style.left=(Math.random()*100)+'%';
    s.style.top=(Math.random()*100)+'%';
    s.style.setProperty('--o',(Math.random()*0.4+0.15).toFixed(2));
    s.style.animationDuration=(Math.random()*6+5).toFixed(1)+'s';
    s.style.animationDelay=(Math.random()*8).toFixed(1)+'s';
    amb.appendChild(s);
  }
})();

/* ---------- patterns ---------- */
const PATTERNS = {
  coherence: {
    name:'Coherence',
    phases:(pace)=>[
      {word:'breathe in', dur:pace, kind:'in'},
      {word:'breathe out', dur:pace, kind:'out'},
    ]
  },
  '478': {
    name:'4 · 7 · 8',
    phases:()=>[
      {word:'breathe in', dur:4, kind:'in'},
      {word:'hold', dur:7, kind:'hold'},
      {word:'breathe out', dur:8, kind:'out'},
    ]
  }
};

/* ---------- state ---------- */
let pattern='coherence', durationMin=5, pace=5.5, soundOn=true;
let running=false, raf=null, sessionT0=0, phaseIdx=0, phaseT0=0, phases=[], totalSec=0;
const STORE='breathe.sessions.v1';

/* ---------- elements ---------- */
const $=id=>document.getElementById(id);
const orb=$('orb'), halo=$('halo'), phaseWord=$('phaseWord'), phaseCount=$('phaseCount'),
      remaining=$('remaining'), prog=$('prog'), controls=$('controls'), endBtn=$('endBtn'),
      done=$('done'), doneSub=$('doneSub');
const CIRC=2*Math.PI*48.5;

/* ---------- audio: soft chimes ---------- */
let actx=null, master=null;
function ensureAudio(){
  /* iOS: route Web Audio as media playback so it plays even with the silent switch on (iOS 16.4+) */
  try{ if('audioSession' in navigator){ navigator.audioSession.type='playback'; } }catch(e){}
  if(!actx){
    actx=new (window.AudioContext||window.webkitAudioContext)();
    master=actx.createGain();
    master.gain.value=0.5;
    master.connect(actx.destination);
  }
  if(actx.state==='suspended') actx.resume();
  /* iOS unlock: play a silent buffer inside the user gesture */
  try{
    const b=actx.createBuffer(1,1,22050);
    const src=actx.createBufferSource();
    src.buffer=b; src.connect(actx.destination); src.start(0);
  }catch(e){}
}
/* if iOS suspends the context mid-session (interruption/screen tap), resume on next touch */
document.addEventListener('touchend',()=>{ if(actx&&actx.state==='suspended') actx.resume(); },{passive:true});
function bell(freq, when=0, vol=0.16, decay=3.4){
  if(!soundOn||!actx) return;
  const t=actx.currentTime+when;
  const lp=actx.createBiquadFilter();
  lp.type='lowpass'; lp.frequency.value=freq*4; lp.Q.value=0.5;
  lp.connect(master);
  [[1,1],[2.756,0.28],[5.404,0.08]].forEach(([mult,amp])=>{
    const o=actx.createOscillator(), g=actx.createGain();
    o.type='sine'; o.frequency.value=freq*mult;
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(vol*amp,t+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001,t+decay*(mult>1?0.55:1));
    o.connect(g); g.connect(lp);
    o.start(t); o.stop(t+decay+0.1);
  });
}
const NOTES={in:392.00, hold:329.63, out:261.63}; /* G4, E4, C4 — gentle descending triad */

/* ---------- helpers ---------- */
const ease=t=>0.5-0.5*Math.cos(Math.PI*t);
const fmt=s=>{s=Math.max(0,Math.round(s));return Math.floor(s/60)+':' + String(s%60).padStart(2,'0');};
function dkey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function load(){try{return JSON.parse(localStorage.getItem(STORE))||[];}catch(e){return [];}}
function save(arr){try{localStorage.setItem(STORE,JSON.stringify(arr));}catch(e){}}

/* ---------- session ---------- */
function begin(){
  ensureAudio();
  phases=PATTERNS[pattern].phases(pace);
  totalSec=durationMin*60;
  running=true; phaseIdx=0;
  sessionT0=performance.now(); phaseT0=sessionT0;
  controls.classList.add('hidden');
  endBtn.classList.add('show');
  phaseWord.textContent=phases[0].word;
  bell(NOTES[phases[0].kind],0.15);
  requestWake();
  raf=requestAnimationFrame(tick);
}
function tick(now){
  if(!running) return;
  const elapsed=(now-sessionT0)/1000;
  let ph=phases[phaseIdx];
  let pt=(now-phaseT0)/1000;
  if(pt>=ph.dur){
    phaseT0=now; pt=0;
    phaseIdx=(phaseIdx+1)%phases.length;
    ph=phases[phaseIdx];
    phaseWord.textContent=ph.word;
    bell(NOTES[ph.kind]);
  }
  const t=Math.min(1,pt/ph.dur);
  const MIN=0.62, MAX=1.06;
  let s;
  if(ph.kind==='in') s=MIN+(MAX-MIN)*ease(t);
  else if(ph.kind==='out') s=MAX-(MAX-MIN)*ease(t);
  else s=MAX+0.012*Math.sin(pt*2.2); /* hold: faint shimmer */
  orb.style.setProperty('--s',s.toFixed(4));
  halo.style.setProperty('--s',(s*1.06).toFixed(4));
  phaseCount.textContent=Math.ceil(ph.dur-pt);
  remaining.textContent=fmt(totalSec-elapsed);
  prog.style.strokeDashoffset=(CIRC*(1-Math.min(1,elapsed/totalSec))).toFixed(1);
  if(elapsed>=totalSec){finish(true);return;}
  raf=requestAnimationFrame(tick);
}
function finish(completed){
  if(!running) return;
  running=false;
  cancelAnimationFrame(raf);
  releaseWake();
  const secs=Math.min(totalSec,Math.round((performance.now()-sessionT0)/1000));
  endBtn.classList.remove('show');
  let saved=false;
  if(secs>=30){
    const arr=load();
    arr.push({t:new Date().toISOString(), s:secs, p:pattern});
    save(arr); saved=true;
  }
  /* completion chime: gentle ascending pair */
  if(completed){ bell(261.63,0,0.14,4); bell(392.00,0.9,0.12,4.5); bell(523.25,1.8,0.09,5); }
  resetStage();
  renderJourney();
  if(completed||saved){
    const today=minutesToday();
    doneSub.innerHTML=(completed?'You stayed with your breath for '+Math.round(secs/60)+' minute'+(Math.round(secs/60)===1?'':'s')+'.':'Session ended — '+fmt(secs)+' recorded.')
      +'<br>'+today+' min of stillness today.';
    done.classList.add('show');
  }else{
    controls.classList.remove('hidden');
  }
}
function resetStage(){
  phaseWord.textContent='ready';
  phaseCount.textContent='';
  remaining.textContent='';
  orb.style.setProperty('--s',0.78);
  halo.style.setProperty('--s',0.82);
  prog.style.strokeDashoffset=CIRC;
}

/* ---------- wake lock (keep screen on) ---------- */
let wake=null;
async function requestWake(){try{if('wakeLock' in navigator) wake=await navigator.wakeLock.request('screen');}catch(e){}}
function releaseWake(){try{wake&&wake.release();wake=null;}catch(e){}}

/* ---------- journey ---------- */
function minutesToday(){
  const k=dkey(new Date());
  return Math.round(load().filter(e=>dkey(new Date(e.t))===k).reduce((a,e)=>a+e.s,0)/60);
}
function streaks(daySet){
  /* current streak: consecutive days ending today or yesterday */
  let cur=0; const d=new Date();
  if(!daySet.has(dkey(d))) d.setDate(d.getDate()-1);
  while(daySet.has(dkey(d))){cur++;d.setDate(d.getDate()-1);}
  /* best streak */
  const keys=[...daySet].sort();
  let best=0,run=0,prev=null;
  for(const k of keys){
    if(prev){
      const a=new Date(prev),b=new Date(k);
      run=((b-a)/86400000===1)?run+1:1;
    }else run=1;
    best=Math.max(best,run);prev=k;
  }
  return {cur,best};
}
function renderJourney(){
  const arr=load();
  const daySet=new Set(arr.map(e=>dkey(new Date(e.t))));
  $('stSessions').textContent=arr.length;
  $('stMinutes').innerHTML=Math.round(arr.reduce((a,e)=>a+e.s,0)/60)+'<em>min</em>';
  const {cur,best}=streaks(daySet);
  $('stStreak').innerHTML=cur+'<em>'+(cur===1?'day':'days')+'</em>';
  $('stBest').innerHTML=best+'<em>'+(best===1?'day':'days')+'</em>';
  /* 14-day strip */
  const days=$('days'); days.innerHTML='';
  const DOW=['S','M','T','W','T','F','S'];
  for(let i=13;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i);
    const el=document.createElement('div');
    el.className='day'+(daySet.has(dkey(d))?' hit':'')+(i===0?' today':'');
    el.innerHTML='<div class="dot"></div><span>'+DOW[d.getDay()]+'</span>';
    days.appendChild(el);
  }
  /* log */
  const log=$('log'); log.innerHTML='';
  if(!arr.length){
    log.innerHTML='<div class="empty">No sessions yet.<br>Your practice begins with a single breath.</div>';
    return;
  }
  const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  arr.slice(-12).reverse().forEach(e=>{
    const d=new Date(e.t);
    const hh=d.getHours()%12||12, ap=d.getHours()>=12?'pm':'am';
    const div=document.createElement('div');
    div.className='entry';
    div.innerHTML='<div class="l"><div class="when">'+MON[d.getMonth()]+' '+d.getDate()+' · '+hh+':'+String(d.getMinutes()).padStart(2,'0')+' '+ap+'</div>'
      +'<div class="pat">'+PATTERNS[e.p].name+'</div></div>'
      +'<div class="mins">'+fmt(e.s)+'</div>';
    log.appendChild(div);
  });
}

/* ---------- UI wiring ---------- */
function bindChips(rowId,attr,fn){
  $(rowId).addEventListener('click',e=>{
    const b=e.target.closest('.chip'); if(!b) return;
    [...$(rowId).children].forEach(c=>c.classList.remove('on'));
    b.classList.add('on'); fn(b.dataset[attr]);
  });
}
bindChips('patternRow','pat',v=>{
  pattern=v;
  $('paceWrap').style.display=(v==='coherence')?'flex':'none';
});
bindChips('durRow','min',v=>{durationMin=+v;});

const paceEl=$('pace');
function paceFill(){paceEl.style.setProperty('--fill',((paceEl.value-40)/30*100)+'%');}
paceEl.addEventListener('input',()=>{
  pace=paceEl.value/10;
  $('paceOut').textContent=pace.toFixed(1)+'s';
  paceFill();
});
paceFill();

$('soundBtn').addEventListener('click',()=>{
  soundOn=!soundOn;
  $('soundBtn').classList.toggle('on',soundOn);
  $('soundBtn').textContent=soundOn?'♪':'∅';
});
$('beginBtn').addEventListener('click',begin);
endBtn.addEventListener('click',()=>finish(false));
$('doneBtn').addEventListener('click',()=>done.classList.remove('show'));

$('navPractice').addEventListener('click',()=>switchView('Practice'));
$('navJourney').addEventListener('click',()=>switchView('Journey'));
function switchView(v){
  ['Practice','Journey'].forEach(x=>{
    $('view'+x).classList.toggle('on',x===v);
    $('nav'+x).classList.toggle('on',x===v);
  });
  if(v==='Journey') renderJourney();
}

/* pause if tab hidden mid-session: end gracefully */
document.addEventListener('visibilitychange',()=>{
  if(document.hidden&&running) finish(false);
});

resetStage();
renderJourney();

/* ---------- PWA service worker ---------- */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
